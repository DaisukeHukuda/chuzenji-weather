<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <title>Lake Chuzenji Weather by Sup! Sup!</title>
    <!-- ホーム画面追加アイコン（雲のイラスト） -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="中禅寺湖天気" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="ptr"><span id="ptr-text">↓ 引っ張って更新</span></div>
    <main id="app">
      <header class="app-header">
        <h1>Lake Chuzenji Weather by Sup! Sup!</h1>
        <p class="source">
          データ出典: 気象庁(JMA)の予報を <a href="https://open-meteo.com" target="_blank" rel="noopener">Open-Meteo</a> から取得 ／
          中禅寺湖（緯度36.727 / 経度139.477 / 標高1269m）で標高補正
        </p>
        <div class="status-row">
          <span id="auto">🔄 自動更新 5分ごと</span>
          <span id="updated">最終 --:--</span>
          <span id="next">次 -:--</span>
          <button id="refresh-btn" type="button">更新</button>
        </div>
        <div id="stale" class="stale hidden">最新の取得に失敗。表示は古い可能性があります。</div>
      </header>

      <section id="matrix-host"></section>

      <nav class="tabs" id="tabs">
        <button data-g="1h" class="active">1時間</button>
        <button data-g="halfday">半日</button>
        <button data-g="1d">1日</button>
      </nav>
      <button id="now-btn" class="now-btn" type="button">現在時刻に戻る</button>
    </main>
    <script type="module" src="/src/app.ts"></script>
  </body>
</html>
